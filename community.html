<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Partnership</title>
    <link rel="stylesheet" href="styles.css">  
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1818; /* Dark, near-black background matching the image */
            color: #ffffff; /* White text */
            font-family: 'Ethnocentric', 'Arial Black', 'Impact', 'Arial', sans-serif; /* Bold, impactful font selection */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        header h1 {
            font-size: 64px;
            line-height: 0.95;
            text-transform: lowercase; /* Matches the lowercase layout of the header image */
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 60px;
        }

        .tiers-container {
            display: flex;
            flex-direction: column;
            gap: 28px;
            max-width: 520px;
            margin: 0 auto 50px auto;
            text-align: left;
        }

        .tier-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-family: 'Arial', sans-serif; /* Clean sans-serif for the list items */
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .tier-price {
            text-align: right;
            min-width: 160px;
        }

        .footer-action {
            margin-top: 40px;
            display: flex;
            justify-content: center;
        }
    </style>  
</head>
<body>

    <div class="container">
        <header>
            <h1>Community<br>partnership</h1>
        </header>

        <div class="tiers-container">
            <div class="tier-row">
                <span class="tier-name">40th Medallion Partner</span>
                <span class="tier-price">$10,000 +</span>
            </div>

            <div class="tier-row">
                <span class="tier-name">Backstage Pass Partner</span>
                <span class="tier-price">$5,000-$9,999</span>
            </div>

            <div class="tier-row">
                <span class="tier-name">Headliner Partner</span>
                <span class="tier-price">$2,500-$4,999</span>
            </div>

            <div class="tier-row">
                <span class="tier-name">Opening Act Partner</span>
                <span class="tier-price">$1,000-$2,499</span>
            </div>

            <div class="tier-row">
                <span class="tier-name">Roadie Partner</span>
                <span class="tier-price">$500-$999</span>
            </div>
        </div>
            <div class="cta-container">
                <a href="https://www.popehighschoolfoundation.com/popefest-26" target="_blank" class="btn-ticket">Donate Now</a>
            </div>
    </div>
</body>
</html>
